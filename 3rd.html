<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Request for Proposal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        table {
            border-collapse: collapse;
            width: 100%;
        }
        td {
            padding: 6px;
            vertical-align: top;
        }
        .container {
            width: 650px;
            border: 1px solid #000;
            padding: 15px;
       
        
        }
    </style>
</head>
<body>

<h2>How can we help?</h2>

<div class="container">
    <fieldset><legend> Request for proposal</legend>
<form>


<table>
    <tr>
       
    

    <tr>
        <td>Your company:</td>
        <td><input type="text"></td>
    </tr>

    <tr>
        <td>Email:</td>
        <td><input type="email"></td>
    </tr>

    <tr>
        <td>Username:</td>
        <td><input type="text"></td>
    </tr>

    <tr>
        <td>Password:</td>
        <td><input type="password"></td>
    </tr>

    <tr>
        <td>Your business:</td>
        <td>
            <textarea rows="4" cols="30">Briefly describe your business in this space</textarea>
        </td>
    </tr>

    <tr>
        <td>Company Size:</td>
        <td>
            
                <input type="radio" name="size">Less than 10
                <br><input type="radio" name="size">11 to 50
                <br><input type="radio" name="size">50 to 200
               <br><input type="radio" name="size">Over 200
            
        </td>
    </tr>

    <tr>
        
        <td valign = "top"><option>services:</option></td>
            <td>
                
                    <input type="checkbox" name  = "size" value="brandidentity">Brand Identity
                    <input type="checkbox" name = "size" value="newwebsite">New Website
                    <input type="checkbox" name = "size" value="webredesign">Web Redesign
                
            
        </td>
    </tr>

    <tr>
        <td>Timeline:</td>
        <td>
            
                
                    
                        <select>
                            <option>Immediately</option>
                            <option>1–3 Months</option>
                            <option>3–6 Months</option>
                        </select>
                    </td>
     </tr>           
                <tr>
                    <td>
                        <input type="submit" value="Send to dev / design">
                    </td>
                </tr>
            
        </td>
    </tr>


</table>
</form>
</fieldset>
</div>

</body>
</html>
