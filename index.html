<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My HTML & CSS Projects</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #171717;
      --border: #2a2a2a;
      --border-hover: #444;
      --text: #f0ede8;
      --muted: #666;
      --accent: #c8f060;
      --accent-dim: rgba(200, 240, 96, 0.08);
      --finals: #f0a060;
      --finals-dim: rgba(240, 160, 96, 0.08);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 0;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 0 auto;
      padding: 80px 32px 80px;
    }

    /* Header */
    .header {
      margin-bottom: 64px;
      animation: fadeUp 0.6s ease both;
    }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .eyebrow::after {
      content: '';
      display: block;
      height: 1px;
      width: 48px;
      background: var(--accent);
      opacity: 0.5;
    }

    h1 {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: clamp(32px, 5vw, 52px);
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 16px;
    }

    h1 span {
      font-weight: 500;
    }

    .header-sub {
      font-size: 14px;
      color: var(--muted);
      font-weight: 300;
    }

    /* Section label */
    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
      margin-top: 48px;
    }

    .section-label:first-of-type {
      margin-top: 0;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .grid-finals {
      grid-template-columns: repeat(2, 1fr);
      max-width: 360px;
    }

    /* Cards */
    .card {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
      animation: fadeUp 0.5s ease both;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent-dim);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .card:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
    }

    .card:hover::before { opacity: 1; }

    .card.finals::before { background: var(--finals-dim); }
    .card.finals:hover { border-color: var(--finals); }
    .card.finals .card-num { color: var(--finals); }
    .card.finals .card-dot { background: var(--finals); }

    .card-num {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.06em;
    }

    .card-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
    }

    .card-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      margin-top: auto;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .card:hover .card-dot { opacity: 1; }

    /* Corner arrow */
    .card-arrow {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 14px;
      color: var(--muted);
      opacity: 0;
      transform: translate(-4px, 4px);
      transition: opacity 0.2s, transform 0.2s;
    }

    .card:hover .card-arrow {
      opacity: 1;
      transform: translate(0, 0);
    }

    /* Footer */
    .footer {
      margin-top: 80px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      animation: fadeUp 0.6s 0.4s ease both;
    }

    .footer-text {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    .count {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .count span { color: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.10s; }
    .card:nth-child(3) { animation-delay: 0.15s; }
    .card:nth-child(4) { animation-delay: 0.20s; }
    .card:nth-child(5) { animation-delay: 0.25s; }
    .card:nth-child(6) { animation-delay: 0.30s; }

    @media (max-width: 560px) {
      .wrapper { padding: 48px 20px; }
      .grid { grid-template-columns: repeat(2, 1fr); }
      .grid-finals { grid-template-columns: repeat(2, 1fr); max-width: 100%; }
    }

    @media (max-width: 360px) {
      .grid, .grid-finals { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <header class="header">
      <div class="eyebrow">Portfolio</div>
      <h1>HTML & CSS<br><span>Projects</span></h1>
      <p class="header-sub">Click any project to open it</p>
    </header>

    <p class="section-label">Core projects</p>
    <div class="grid">
      <a class="card" href="uno.html">
        <span class="card-num">01</span>
        <span class="card-title">Project 1</span>
        <span class="card-dot"></span>
        <span class="card-arrow">↗</span>
      </a>
      <a class="card" href="dos.html">
        <span class="card-num">02</span>
        <span class="card-title">Project 2</span>
        <span class="card-dot"></span>
        <span class="card-arrow">↗</span>
      </a>
      <a class="card" href="tres.html">
        <span class="card-num">03</span>
        <span class="card-title">Project 3</span>
        <span class="card-dot"></span>
        <span class="card-arrow">↗</span>
      </a>
      <a class="card" href="cuatro.html">
        <span class="card-num">04</span>
        <span class="card-title">Project 4</span>
        <span class="card-dot"></span>
        <span class="card-arrow">↗</span>
      </a>
      <a class="card" href="cinco.html">
        <span class="card-num">05</span>
        <span class="card-title">Project 5</span>
        <span class="card-dot"></span>
        <span class="card-arrow">↗</span>
      </a>
      <a class="card" href="sais.html">
        <span class="card-num">06</span>
        <span class="card-title">Project 6</span>
        <span class="card-dot"></span>
        <span class="card-arrow">↗</span>
      </a>
    </div>

    <p class="section-label">Finals</p>
    <div class="grid grid-finals">
      <a class="card finals" href="finalstask1.html">
        <span class="card-num">F1</span>
        <span class="card-title">Finals Task 1</span>
        <span class="card-dot"></span>
        <span class="card-arrow">↗</span>
      </a>
      <a class="card finals" href="Finalstask2.html">
        <span class="card-num">F2</span>
        <span class="card-title">Finals Task 2</span>
        <span class="card-dot"></span>
        <span class="card-arrow">↗</span>
      </a>
    </div>

    <footer class="footer">
      <span class="footer-text">HTML & CSS · 2026</span>
      <span class="count"><span>8</span> projects total</span>
    </footer>

  </div>
</body>
</html>
